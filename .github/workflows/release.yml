name: Release (reusable)

# Reusable release workflow for buildd-ai repos. Detects a conventional-commit
# semver bump on dev, opens a release PR to main, lets `release-tag.yml` (in
# each consumer repo) auto-tag on merge. Pair with `sync-dev.yml` to keep dev
# fast-forwardable.
#
# Caller example (.github/workflows/release.yml in your repo):
#
#   name: Release
#   on:
#     schedule: [{ cron: '0 9 * * *' }]
#     workflow_dispatch:
#       inputs:
#         force: { description: 'Bypass "no shippable commits" check', default: 'false' }
#   jobs:
#     release:
#       uses: buildd-ai/.github/.github/workflows/release.yml@main
#       with:
#         package_files: 'package.json apps/web/package.json'   # space-separated
#         force: ${{ inputs.force == 'true' }}

on:
  workflow_call:
    inputs:
      package_files:
        description: 'Space-separated package.json paths to bump'
        required: false
        type: string
        default: 'package.json'
      force:
        description: 'Open the release PR even if no feat/fix commits since last tag'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Check whether dev has shippable commits
        id: shippable
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname --list 'v*' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "shippable=true" >> "$GITHUB_OUTPUT"
            echo "No tags yet — proceeding"
            exit 0
          fi
          COMMITS=$(git log "${LATEST_TAG}..dev" --format='%s' --no-merges 2>/dev/null || true)
          if echo "$COMMITS" | grep -qE '^(feat|fix)(\(.+\))?!?:'; then
            echo "shippable=true" >> "$GITHUB_OUTPUT"
            echo "Shippable commits found since ${LATEST_TAG}"
          else
            echo "shippable=false" >> "$GITHUB_OUTPUT"
            echo "No feat/fix commits since ${LATEST_TAG} — nothing to release"
          fi

      - name: Fetch release script
        if: steps.shippable.outputs.shippable == 'true' || inputs.force == true
        run: |
          curl -fsSL https://raw.githubusercontent.com/buildd-ai/.github/main/scripts/release.sh -o /tmp/release.sh
          chmod +x /tmp/release.sh

      - name: Run release script
        if: steps.shippable.outputs.shippable == 'true' || inputs.force == true
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_FILES: ${{ inputs.package_files }}
        run: bash /tmp/release.sh
